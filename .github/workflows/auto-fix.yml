name: Auto Fix Code

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**.py"   # 👈 sirf python files

jobs:
  autofix:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install tools
        run: |
          pip install black autopep8 isort

      - name: Auto fix Python code only
        run: |
          autopep8 --in-place --recursive .
          black .
          isort .

      - name: Commit changes
        run: |
          git config --global user.name "auto-fix-bot"
          git config --global user.email "bot@users.noreply.github.com"

          git add .

          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto fix Python code"
            git push
          else
            echo "No changes"
          fi
